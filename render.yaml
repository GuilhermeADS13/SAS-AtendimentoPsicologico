# Blueprint do Render (plano free) — roda o container completo (Express +
# WebSocket + agendador) a partir do Dockerfile. No Render: New → Blueprint →
# conecte este repositório. As variáveis com `sync: false` você preenche no painel.
services:
  - type: web
    name: sas-atendimento-psicologico
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: virginia # us-east (mais perto do Brasil entre as regiões free)
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production

      # VITE_* são públicas e embutidas no bundle em build time (o Render as
      # repassa como build args para o Dockerfile).
      - key: VITE_SUPABASE_URL
        value: https://icaybuutkfzpqplsqhtb.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_YzceRGzH1lAlUrdXMLHA8Q_-EPc9yo-
      # Instância pública do MiroTalk (funciona sem hospedar nada). Para
      # self-host (gravação/whiteboard próprios), aponte para o seu servidor.
      - key: VITE_MIROTALK_URL
        value: https://sfu.mirotalk.com

      # Runtime — preencha no painel do Render (não vão para o repositório).
      # DATABASE_URL: use o pooler do Supabase; se a senha tiver @, use %40.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        value: https://icaybuutkfzpqplsqhtb.supabase.co
      - key: OAUTH_SERVER_URL
        value: https://api.manus.im

      # ── E-mails (API HTTP da Brevo) ─────────────────────────────────────
      # NÃO use SMTP aqui: o plano free do Render bloqueia as portas 25/465/587
      # na saída, e todo envio morre em "Connection timeout". A API da Brevo
      # fala HTTPS na 443, que passa. As variáveis SMTP_* abaixo continuam só
      # para desenvolvimento local, onde a 587 abre normalmente.
      # https://render.com/changelog/free-web-services-will-no-longer-allow-outbound-traffic-to-smtp-ports
      # As SMTP_* NÃO são declaradas aqui de propósito. Se estivessem, faltando a
      # chave da Brevo o servidor tentaria SMTP e voltaria a falhar por timeout.
      # Sem elas, o pior caso é dry-run: a notificação fica pendente e é
      # reenviada, em vez de morrer como "failed".
      - key: BREVO_API_KEY # chave da API (Brevo → SMTP & API → API Keys)
        sync: false
      - key: EMAIL_FROM # remetente; precisa estar verificado na Brevo
        value: codexmaciel@gmail.com
      - key: EMAIL_FROM_NAME
        value: VozInterior
      - key: ADMIN_EMAIL # recebe os avisos de solicitação de acesso
        value: codexmaciel@gmail.com
      # APP_URL não é declarada de propósito: sem ela, os e-mails usam a
      # RENDER_EXTERNAL_URL que o Render injeta, e os links acompanham o nome do
      # serviço sozinhos. Defina APP_URL só quando houver domínio próprio, que o
      # Render não tem como adivinhar.
      - key: NOTIFICATIONS_ENABLED # liga o agendador de lembretes (15 em 15 min)
        value: "true"
