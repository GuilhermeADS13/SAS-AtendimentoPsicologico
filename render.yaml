# Blueprint do Render (plano free) — roda o container completo (Express +
# WebSocket + agendador) a partir do Dockerfile. No Render: New → Blueprint →
# conecte este repositório. As variáveis com `sync: false` você preenche no painel.
services:
  - type: web
    name: sas-atendimento-psicologico
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: virginia # us-east (mais perto do Brasil entre as regiões free)
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production

      # VITE_* são públicas e embutidas no bundle em build time (o Render as
      # repassa como build args para o Dockerfile).
      - key: VITE_SUPABASE_URL
        value: https://icaybuutkfzpqplsqhtb.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_YzceRGzH1lAlUrdXMLHA8Q_-EPc9yo-
      # Instância pública do MiroTalk (funciona sem hospedar nada). Para
      # self-host (gravação/whiteboard próprios), aponte para o seu servidor.
      - key: VITE_MIROTALK_URL
        value: https://sfu.mirotalk.com

      # Runtime — preencha no painel do Render (não vão para o repositório).
      # DATABASE_URL: use o pooler do Supabase; se a senha tiver @, use %40.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        value: https://icaybuutkfzpqplsqhtb.supabase.co
      - key: OAUTH_SERVER_URL
        value: https://api.manus.im

      # ── E-mails (Gmail SMTP) ────────────────────────────────────────────
      # Só o SMTP_PASS é secreto (Senha de App do Gmail) — preencha no painel.
      # Os demais o Render cria sozinho ao sincronizar este blueprint.
      - key: ADMIN_EMAIL # recebe os avisos de solicitação de acesso
        value: codexmaciel@gmail.com
      - key: NOTIFICATIONS_ENABLED # liga o agendador de lembretes (15 em 15 min)
        value: "true"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: codexmaciel@gmail.com
      - key: SMTP_FROM # o Gmail exige que o remetente seja a própria conta
        value: codexmaciel@gmail.com
      # SENHA DE APP do Gmail (16 caracteres). NUNCA no repositório.
      - key: SMTP_PASS
        sync: false
