name: CD

# Roda depois que o CI conclui. Só faz deploy se o CI passou na main e se o
# segredo FLY_API_TOKEN estiver configurado (senão o passo é pulado, sem erro).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    name: Deploy (Fly.io)
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        if: ${{ env.FLY_API_TOKEN != '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: ${{ env.FLY_API_TOKEN != '' }}
        run: flyctl deploy --remote-only

      - name: CD não configurado
        if: ${{ env.FLY_API_TOKEN == '' }}
        run: |
          echo "FLY_API_TOKEN não configurado — deploy pulado."
          echo "Veja a seção 'Deploy contínuo (CD)' no README para ativar."
